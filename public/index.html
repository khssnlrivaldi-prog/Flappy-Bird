<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flappy Bird</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- MENU -->
    <div id="menu">

        <h1>Flappy Bird</h1>

        <button id="playBtn">PLAY</button>
        <button id="aiBtn">AI MODE</button>

        <p class="info">
            Press SPACE or Click the Mouse to Fly
        </p>

    </div>

    <!-- GAME OVER -->
    <div id="gameOver">

        <h2>GAME OVER</h2>

        <p class="scoreLabel">
            Score :
            <span id="finalScore">0</span>
        </p>

        <p class="scoreLabel">
            High Score :
            <span id="bestScore">0</span>
        </p>

        <button id="restartBtn" class="menu-btn">
            Try Again
        </button>

    </div>

    <!-- HUD -->
    <div id="hud">

        <div id="scorePanel">

            <div class="scoreTitle">
                High Score
            </div>

            <div id="highScoreHud">
                0
            </div>

            <div class="scoreTitle">
                Score
            </div>

            <div id="score">
                0
            </div>

        </div>

        <button id="pauseBtn" class="menu-btn">
            P : Pause
        </button>

    </div>

    <!-- CANVAS GAME -->
    <div id="gameBackground"></div>
    <canvas id="gameCanvas"></canvas>
    <!-- AUDIO -->

    <audio id="jumpSound">
        <source src="sounds/jump.mp3" type="audio/mp3">
    </audio>

    <audio id="pointSound">
        <source src="sounds/point.mp3" type="audio/mp3">
    </audio>

    <audio id="hitSound">
        <source src="sounds/hit.mp3" type="audio/mp3">
    </audio>

    <script src="game.js"></script>

</body>

</html>
